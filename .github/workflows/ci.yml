name: Flutter Build & Release APK

on:
  push:
    # This ensures the workflow only runs when you push a version tag
    tags:
      - 'v*'

# Grant the workflow permission to create/update releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      # New Step: Create GitHub Release and upload the APK automatically
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true  # Automatically generates a changelog based on commit history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
