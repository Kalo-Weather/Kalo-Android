name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - run: flutter pub get
      - run: flutter analyze

  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - run: flutter pub get
      - name: Create .env for tests
        run: |
          cat > .env << EOF
          KALO_CLIENT_SECRET=test
          KALO_PROXY_BASE_URL=
          KALO_DECRYPTION_SECRET=
          EOF
      - run: flutter test

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - run: flutter pub get

      - name: Create .env
        run: |
          cat > .env << EOF
          KALO_CLIENT_SECRET=${{ secrets.KALO_CLIENT_SECRET }}
          KALO_PROXY_BASE_URL=${{ secrets.KALO_PROXY_BASE_URL }}
          KALO_DECRYPTION_SECRET=${{ secrets.KALO_DECRYPTION_SECRET }}
          EOF

      - name: Decode keystore
        if: github.ref_type == 'tag'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: github.ref_type == 'tag'
        run: |
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          EOF

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Build release AAB
        if: github.ref_type == 'tag'
        run: flutter build appbundle --release

      - name: Build release APK
        if: github.ref_type == 'tag'
        run: flutter build apk --release

      - name: Upload release AAB
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload release APK
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
