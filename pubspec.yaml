name: mobile
description: "Beautiful open-source weather app for Android with Material You design, radar overlay, and Wear OS companion."
publish_to: 'none'

# When updating this, also update the version in pubspec.lock
# and create a corresponding git tag vX.Y.Z for releases.
version: 1.0.1+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  crypto: ^3.0.7
  encrypt: ^5.0.3
  device_info_plus: 13.1.0
  flutter_riverpod: ^2.6.1
  convert: ^3.1.1

  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  dynamic_color: ^1.8.1
  geolocator: ^14.0.3
  package_info_plus: 10.1.0
  geocoding: ^4.0.0
  http: ^1.6.0
  flutter_dotenv: ^5.2.1
  home_widget: ^0.9.0
  liquid_glass_widgets: ^0.18.6
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  weather_animation: ^1.2.0
  flutter_local_notifications: ^22.0.1
  path_provider: ^2.1.5
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  adaptive_icon_background: "#0D0D1A"

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: WeatherIcons
      fonts:
        - asset: assets/fonts/weathericons-regular-webfont.ttf

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
